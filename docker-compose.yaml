services:

    cray: &cray
        command: /app/cray/scripts/start_one_server.sh
        # Forward host SCALARLM_* overrides into the container. Compose only
        # substitutes ${VAR} into the compose file itself; it does NOT inject
        # host env into the container unless listed here. get_config() reads
        # these from the in-container os.environ (SCALARLM_MODEL -> config
        # "model"; SCALARLM_VLLM_ARGS read by create_vllm). Without this,
        # `SCALARLM_MODEL=... ./scalarlm up <target>` silently serves the
        # default model and /v1/generate 404s for the requested model.
        environment:
            - SCALARLM_MODEL
            - SCALARLM_VLLM_ARGS
        build:
            context: .
            dockerfile: Dockerfile
            platforms:
                - ${DOCKER_PLATFORM:-linux/arm64}
            args:
                - TORCH_CUDA_ARCH_LIST=${TORCH_CUDA_ARCH_LIST}
                - BASE_NAME=${BASE_NAME}
                - VLLM_TARGET_DEVICE=${VLLM_TARGET_DEVICE}
                - VLLM_SOURCE=${VLLM_SOURCE:-local}
                - VLLM_BRANCH=${VLLM_BRANCH:-main}
                - VLLM_REPO=${VLLM_REPO:-https://github.com/supermassive-intelligence/vllm-fork.git}
        ports:
            - "8000:8000"
            - "8001:8001"
        volumes:
            - type: bind
              source: ./models
              target: /root/.cache/huggingface
            - type: bind
              source: ./infra/cray_infra
              target: /app/cray/infra/cray_infra
            - type: bind
              source: ./scripts
              target: /app/cray/scripts
            - type: bind
              source: ./ml
              target: /app/cray/ml
            - type: bind
              source: ./test
              target: /app/cray/test
        networks:
            - cray-network


    cray-nvidia:
        <<: *cray
        runtime: nvidia
        restart: unless-stopped
        cap_add:
          - SYS_PTRACE
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          capabilities: [gpu]

    cray-spark:
        <<: *cray
        runtime: nvidia
        restart: unless-stopped
        cap_add:
          - SYS_PTRACE
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          capabilities: [gpu]

    cray-amd:
        <<: *cray
        devices:
          - /dev/kfd
          - /dev/dri
        security_opt:
          - seccomp:unconfined
        cap_add:
          - SYS_PTRACE

networks:
  cray-network:
    name: cray_network

