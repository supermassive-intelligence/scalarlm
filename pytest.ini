[pytest]
# Keep asyncio support explicit so we don't pick up unintended async tests.
asyncio_mode = strict

# Default discovery: every test/ subtree.
testpaths = test
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

addopts = -ra

filterwarnings =
    ignore::DeprecationWarning:pydantic
    ignore::DeprecationWarning:pkg_resources
