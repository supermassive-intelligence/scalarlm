apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-jobs
  labels:
    {{- include "scalarlm.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .Values.storage.jobs.accessMode }}
  resources:
    requests:
      storage: {{ .Values.storage.jobs.size }}
  storageClassName: {{ .Values.storage.jobs.storageClass }}
