{{- if and .Values.cloudflared.enabled (not .Values.cloudflared.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scalarlm.cloudflaredSecretName" . }}
  labels:
    {{- include "scalarlm.cloudflaredLabels" . | nindent 4 }}
type: Opaque
stringData:
  tunnelToken: {{ required "cloudflared.tunnelToken is required when cloudflared.enabled and no existingSecret is set" .Values.cloudflared.tunnelToken | quote }}
{{- end }}
