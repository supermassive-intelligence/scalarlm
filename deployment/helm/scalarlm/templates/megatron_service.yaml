{{- if .Values.megatron.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scalarlm.megatronname" . }}-headless
  labels:
    {{- include "scalarlm.megatronlabels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "scalarlm.megatronSelectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.slurmd_port }}
      targetPort: slurmd
      protocol: TCP
      name: slurmd
{{- end }}
