{{- if .Values.megatron.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "scalarlm.megatronname" . }}
  labels:
    {{- include "scalarlm.megatronlabels" . | nindent 4 }}
spec:
  serviceName: {{ include "scalarlm.megatronname" . }}-headless
  replicas: {{ .Values.replicaCounts.training }}
  selector:
    matchLabels:
      {{- include "scalarlm.megatronSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "scalarlm.megatronlabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostPID: {{ .Values.megatron.hostPID }}
      hostIPC: {{ .Values.megatron.hostIPC }}
      {{- include "scalarlm.dnsConfig" . | nindent 6 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/cray/scripts/start_one_server.sh"]
          env:
            {{- include "scalarlm.envFromMap" .Values.megatron.extraEnv | nindent 12 }}
          ports:
            - name: slurmd
              containerPort: {{ .Values.service.slurmd_port }}
              protocol: TCP
          {{- if .Values.megatron.probes.enabled }}
          startupProbe:
            tcpSocket:
              port: slurmd
            periodSeconds: {{ .Values.megatron.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.megatron.probes.startup.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: slurmd
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: slurmd
            periodSeconds: 30
            failureThreshold: 5
          {{- end }}
          volumeMounts:
            - name: scalarlm-config
              mountPath: /app/cray/cray-config.yaml
              subPath: cray-config.yaml
            - name: scalarlm-jobs
              mountPath: /app/cray/jobs
            - name: scalarlm-slurm-config
              mountPath: /app/cray/nfs
            {{- if ne .Values.storage.cache.kind "disabled" }}
            - name: scalarlm-cache
              mountPath: /root/.cache/huggingface
            {{- end }}
            {{- if ne .Values.megatron.dshm.kind "disabled" }}
            - name: dshm
              mountPath: /dev/shm
            {{- end }}
            {{- range .Values.megatron.extraVolumes }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
          resources:
            limits:
              {{- range $k, $v := .Values.megatron.resources.limits }}
              {{ $k }}: {{ $v }}
              {{- end }}
              {{- range $k, $v := .Values.megatron.extraResources }}
              {{ $k }}: {{ $v }}
              {{- end }}
          securityContext:
            capabilities:
              add:
                {{- range .Values.megatron.capabilities }}
                - {{ . }}
                {{- end }}
                {{- range .Values.megatron.extraCapabilities }}
                - {{ . }}
                {{- end }}
      volumes:
        - name: scalarlm-jobs
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-jobs
        - name: scalarlm-slurm-config
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-slurm-config
        - name: scalarlm-config
          configMap:
            name: {{ .Release.Name }}-megatron-configmap
        {{- if eq .Values.storage.cache.kind "pvc" }}
        - name: scalarlm-cache
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-cache
        {{- else if eq .Values.storage.cache.kind "hostPath" }}
        - name: scalarlm-cache
          hostPath:
            path: {{ .Values.storage.cache.hostPath }}
            type: DirectoryOrCreate
        {{- else if eq .Values.storage.cache.kind "emptyDir" }}
        - name: scalarlm-cache
          emptyDir: {}
        {{- end }}
        {{- if eq .Values.megatron.dshm.kind "emptyDir" }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.megatron.dshm.sizeLimit }}
        {{- else if eq .Values.megatron.dshm.kind "hostPath" }}
        - name: dshm
          hostPath:
            path: {{ .Values.megatron.dshm.hostPath }}
            type: Directory
        {{- end }}
        {{- range .Values.megatron.extraVolumes }}
        - name: {{ .name }}
          hostPath:
            path: {{ .hostPath }}
            type: {{ default "DirectoryOrCreate" .type }}
        {{- end }}
      {{- include "scalarlm.nodeAffinity" .Values.megatron.nodeAffinityHostnames | nindent 6 }}
{{- end }}
